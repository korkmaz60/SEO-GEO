services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: seogeo-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: seogeo
      POSTGRES_USER: seogeo_user
      POSTGRES_PASSWORD: seogeo_secret_2026
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seogeo_user -d seogeo"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: seogeo-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
